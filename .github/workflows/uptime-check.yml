name: Uptime Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check sites and create status file
        id: status
        run: |
          mkdir -p src/data

          check_url() {
            local url=$1
            local result
            result=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}|%{url_effective}" --max-time 30 -L "$url" 2>/dev/null)
            echo "$result"
          }

          check_api() {
            local url=$1
            local result
            result=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}" --max-time 30 "$url" 2>/dev/null)
            echo "$result"
          }

          get_status() {
            local code=$1
            if [[ "$code" == "200" ]]; then
              echo "operational"
            else
              echo "down"
            fi
          }

          BWENGR=$(check_url "https://bwengr.com")
          DRAINAGE=$(check_url "https://drainageplans.la")
          GRADING=$(check_url "https://gradingplans.la")
          CIVIL=$(check_url "https://civilengineer.la")
          BWENG=$(check_url "https://bw.engineering")
          LAENG=$(check_url "https://losangeles.engineering")
          API=$(check_api "https://api.bwengr.com/health")
          BWENGR_CODE=$(echo $BWENGR | cut -d'|' -f1)
          BWENGR_TIME=$(echo $BWENGR | cut -d'|' -f2)
          DRAINAGE_CODE=$(echo $DRAINAGE | cut -d'|' -f1)
          DRAINAGE_TIME=$(echo $DRAINAGE | cut -d'|' -f2)
          GRADING_CODE=$(echo $GRADING | cut -d'|' -f1)
          GRADING_TIME=$(echo $GRADING | cut -d'|' -f2)
          CIVIL_CODE=$(echo $CIVIL | cut -d'|' -f1)
          CIVIL_TIME=$(echo $CIVIL | cut -d'|' -f2)
          BWENG_CODE=$(echo $BWENG | cut -d'|' -f1)
          BWENG_TIME=$(echo $BWENG | cut -d'|' -f2)
          LAENG_CODE=$(echo $LAENG | cut -d'|' -f1)
          LAENG_TIME=$(echo $LAENG | cut -d'|' -f2)
          API_CODE=$(echo $API | cut -d'|' -f1)
          API_TIME=$(echo $API | cut -d'|' -f2)

          BWENGR_STATUS=$(get_status $BWENGR_CODE)
          DRAINAGE_STATUS=$(get_status $DRAINAGE_CODE)
          GRADING_STATUS=$(get_status $GRADING_CODE)
          CIVIL_STATUS=$(get_status $CIVIL_CODE)
          BWENG_STATUS=$(get_status $BWENG_CODE)
          LAENG_STATUS=$(get_status $LAENG_CODE)
          API_STATUS=$(get_status $API_CODE)

          echo "bwengr_status=$BWENGR_STATUS" >> $GITHUB_OUTPUT
          echo "bwengr_time=$BWENGR_TIME" >> $GITHUB_OUTPUT
          echo "bwengr_code=$BWENGR_CODE" >> $GITHUB_OUTPUT
          echo "drainage_status=$DRAINAGE_STATUS" >> $GITHUB_OUTPUT
          echo "drainage_time=$DRAINAGE_TIME" >> $GITHUB_OUTPUT
          echo "drainage_code=$DRAINAGE_CODE" >> $GITHUB_OUTPUT
          echo "grading_status=$GRADING_STATUS" >> $GITHUB_OUTPUT
          echo "grading_time=$GRADING_TIME" >> $GITHUB_OUTPUT
          echo "grading_code=$GRADING_CODE" >> $GITHUB_OUTPUT
          echo "civil_status=$CIVIL_STATUS" >> $GITHUB_OUTPUT
          echo "civil_time=$CIVIL_TIME" >> $GITHUB_OUTPUT
          echo "civil_code=$CIVIL_CODE" >> $GITHUB_OUTPUT
          echo "bweng_status=$BWENG_STATUS" >> $GITHUB_OUTPUT
          echo "bweng_time=$BWENG_TIME" >> $GITHUB_OUTPUT
          echo "bweng_code=$BWENG_CODE" >> $GITHUB_OUTPUT
          echo "laeng_status=$LAENG_STATUS" >> $GITHUB_OUTPUT
          echo "laeng_time=$LAENG_TIME" >> $GITHUB_OUTPUT
          echo "laeng_code=$LAENG_CODE" >> $GITHUB_OUTPUT

          CURRENT_TIME=$(date -Iseconds)
          CHECKS_FILE="src/data/checks.json"

          if [[ -f "$CHECKS_FILE" ]]; then
            CHECKS=$(cat "$CHECKS_FILE")
          else
            CHECKS="[]"
          fi

          add_check() {
            local service=$1
            local stat=$2
            local time=$3
            local code=$4
            local ms_time
            ms_time=$(echo "$time * 1000" | bc | cut -d'.' -f1)
            CHECKS=$(echo "$CHECKS" | jq --arg t "$CURRENT_TIME" --arg s "$service" --arg st "$stat" --argjson tc "$ms_time" --argjson cd "$code" \
              '. += [{"timestamp": $t, "service": $s, "status": $st, "responseTime": $tc, "httpCode": $cd}]')
          }

          add_check "bwengr.com" "$BWENGR_STATUS" "$BWENGR_TIME" "$BWENGR_CODE"
          add_check "drainageplans.la" "$DRAINAGE_STATUS" "$DRAINAGE_TIME" "$DRAINAGE_CODE"
          add_check "gradingplans.la" "$GRADING_STATUS" "$GRADING_TIME" "$GRADING_CODE"
          add_check "civilengineer.la" "$CIVIL_STATUS" "$CIVIL_TIME" "$CIVIL_CODE"
          add_check "bw.engineering" "$BWENG_STATUS" "$BWENG_TIME" "$BWENG_CODE"
          add_check "losangeles.engineering" "$LAENG_STATUS" "$LAENG_TIME" "$LAENG_CODE"
          add_check "api.bwengr.com" "$API_STATUS" "$API_TIME" "$API_CODE"

          THIRTY_DAYS_AGO=$(date -d "30 days ago" -Iseconds)
          CHECKS=$(echo "$CHECKS" | jq --arg t "$THIRTY_DAYS_AGO" 'map(select(.timestamp >= $t))')

          echo "$CHECKS" > "$CHECKS_FILE"

          calculate_uptime() {
            local service=$1
            local total
            local up_count
            total=$(echo "$CHECKS" | jq --arg s "$service" '[.[] | select(.service == $s)] | length')
            if [[ "$total" -eq 0 ]]; then
              echo "100"
              return
            fi
            up_count=$(echo "$CHECKS" | jq --arg s "$service" '[.[] | select(.service == $s and .status == "operational")] | length')
            echo "scale=2; ($up_count / $total) * 100" | bc
          }

          calculate_avg_response() {
            local service=$1
            local avg
            local filter_code=200
            avg=$(echo "$CHECKS" | jq --arg s "$service" --argjson cd "$filter_code" \
              '[.[] | select(.service == $s and .httpCode == $cd)] | if length > 0 then (map(.responseTime) | add) / length else 0 end' \
              2>/dev/null || echo "0")
            echo "${avg%.*}"
          }

          UP_bwengr=$(calculate_uptime "bwengr.com")
          UP_drainage=$(calculate_uptime "drainageplans.la")
          UP_grading=$(calculate_uptime "gradingplans.la")
          UP_civil=$(calculate_uptime "civilengineer.la")
          UP_bweng=$(calculate_uptime "bw.engineering")
          UP_laeng=$(calculate_uptime "losangeles.engineering")
          UP_api=$(calculate_uptime "api.bwengr.com")

          RT_bwengr=$(calculate_avg_response "bwengr.com")
          RT_drainage=$(calculate_avg_response "drainageplans.la")
          RT_grading=$(calculate_avg_response "gradingplans.la")
          RT_civil=$(calculate_avg_response "civilengineer.la")
          RT_bweng=$(calculate_avg_response "bw.engineering")
          RT_laeng=$(calculate_avg_response "losangeles.engineering")
          RT_api=$(calculate_avg_response "api.bwengr.com")

          echo "bwengr uptime=$UP_bwengr response=$RT_bwengr"
          echo "drainage uptime=$UP_drainage response=$RT_drainage"
          echo "grading uptime=$UP_grading response=$RT_grading"
          echo "civil uptime=$UP_civil response=$RT_civil"
          echo "bweng uptime=$UP_bweng response=$RT_bweng"
          echo "laeng uptime=$UP_laeng response=$RT_laeng"
          echo "api uptime=$UP_api response=$RT_api"

          cat > src/data/status.json << JSONEOF
          {
            "lastChecked": "$CURRENT_TIME",
            "lastUpdated": "$CURRENT_TIME",
            "services": [
              {
                "name": "bwengr.com",
                "url": "https://bwengr.com",
                "description": "Main website and portfolio",
                "status": "$BWENGR_STATUS",
                "responseTime": $RT_bwengr,
                "uptime30d": $UP_bwengr,
                "httpCode": $BWENGR_CODE
              },
              {
                "name": "drainageplans.la",
                "url": "https://drainageplans.la",
                "description": "Altadena fire rebuild drainage plan landing page",
                "status": "$DRAINAGE_STATUS",
                "responseTime": $RT_drainage,
                "uptime30d": $UP_drainage,
                "httpCode": $DRAINAGE_CODE
              },
              {
                "name": "gradingplans.la",
                "url": "https://gradingplans.la",
                "description": "Los Angeles grading plans landing page",
                "status": "$GRADING_STATUS",
                "responseTime": $RT_grading,
                "uptime30d": $UP_grading,
                "httpCode": $GRADING_CODE
              },
              {
                "name": "civilengineer.la",
                "url": "https://civilengineer.la",
                "description": "Civil engineer LA redirect service",
                "status": "$CIVIL_STATUS",
                "responseTime": $RT_civil,
                "uptime30d": $UP_civil,
                "httpCode": $CIVIL_CODE
              },
              {
                "name": "bw.engineering",
                "url": "https://bw.engineering",
                "description": "B+W Engineering short URL",
                "status": "$BWENG_STATUS",
                "responseTime": $RT_bweng,
                "uptime30d": $UP_bweng,
                "httpCode": $BWENG_CODE
              },
              {
                "name": "losangeles.engineering",
                "url": "https://losangeles.engineering",
                "description": "Los Angeles engineering redirect",
                "status": "$LAENG_STATUS",
                "responseTime": $RT_laeng,
                "uptime30d": $UP_laeng,
                "httpCode": $LAENG_CODE
              },
              {
                "name": "api.bwengr.com",
                "url": "https://api.bwengr.com/health",
                "description": "AI search API for B+W Engineering",
                "status": "$API_STATUS",
                "responseTime": $RT_api,
                "uptime30d": $UP_api,
                "httpCode": $API_CODE
              }
            ],
            "incidents": []
          }
          JSONEOF

      - name: Commit status update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if ! git diff --cached --quiet --exit-code; then
            git commit -m "Update status - $(date)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/bwengr/bwengr-status.git HEAD:main || echo "Push failed"
          else
            echo "No changes to commit"
          fi