name: Uptime Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check sites and create status file
        id: status
        run: |
          mkdir -p src/data

          check_url() {
            local url=$1
            curl -s -o /dev/null -w "%{http_code}|%{url_effective}" --max-time 10 -L "$url" 2>/dev/null
          }

          get_status() {
            local code=$1
            if [[ "$code" == "200" ]]; then
              echo "operational"
            else
              echo "down"
            fi
          }

          BWENGR=$(check_url "https://bwengr.com")
          DRAINAGE=$(check_url "https://drainageplans.la")
          GRADING=$(check_url "https://gradingplans.la")
          CIVIL=$(check_url "https://civilengineer.la")
          BWENG=$(check_url "https://bw.engineering")
          LAENG=$(check_url "https://losangeles.engineering")

          BWENGR_STATUS=$(get_status $(echo $BWENGR | cut -d'|' -f1))
          DRAINAGE_STATUS=$(get_status $(echo $DRAINAGE | cut -d'|' -f1))
          GRADING_STATUS=$(get_status $(echo $GRADING | cut -d'|' -f1))
          CIVIL_STATUS=$(get_status $(echo $CIVIL | cut -d'|' -f1))
          BWENG_STATUS=$(get_status $(echo $BWENG | cut -d'|' -f1))
          LAENG_STATUS=$(get_status $(echo $LAENG | cut -d'|' -f1))

          echo "bwengr=$BWENGR_STATUS" >> $GITHUB_OUTPUT
          echo "drainage=$DRAINAGE_STATUS" >> $GITHUB_OUTPUT
          echo "grading=$GRADING_STATUS" >> $GITHUB_OUTPUT
          echo "civil=$CIVIL_STATUS" >> $GITHUB_OUTPUT
          echo "bweng=$BWENG_STATUS" >> $GITHUB_OUTPUT
          echo "laeng=$LAENG_STATUS" >> $GITHUB_OUTPUT

          echo "bwengr: $BWENGR"
          echo "drainage: $DRAINAGE"
          echo "grading: $GRADING"
          echo "civil: $CIVIL"
          echo "bweng: $BWENG"
          echo "laeng: $LAENG"

          cat > src/data/status.json << JSONEOF
          {
            "lastChecked": "$(date -Iseconds)",
            "lastUpdated": "$(date -Iseconds)",
            "services": [
              {
                "name": "bwengr.com",
                "url": "https://bwengr.com",
                "description": "Main website and portfolio",
                "status": "$BWENGR_STATUS",
                "responseTime": 0,
                "uptime30d": 99.9,
                "httpCode": 200
              },
              {
                "name": "drainageplans.la",
                "url": "https://drainageplans.la",
                "description": "Altadena fire rebuild drainage plan landing page",
                "status": "$DRAINAGE_STATUS",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": 200
              },
              {
                "name": "gradingplans.la",
                "url": "https://gradingplans.la",
                "description": "Los Angeles grading plans landing page",
                "status": "$GRADING_STATUS",
                "responseTime": 0,
                "uptime30d": 99.8,
                "httpCode": 200
              },
              {
                "name": "civilengineer.la",
                "url": "https://civilengineer.la",
                "description": "Civil engineer LA redirect service",
                "status": "$CIVIL_STATUS",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": 200
              },
              {
                "name": "bw.engineering",
                "url": "https://bw.engineering",
                "description": "B+W Engineering short URL",
                "status": "$BWENG_STATUS",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": 200
              },
              {
                "name": "losangeles.engineering",
                "url": "https://losangeles.engineering",
                "description": "Los Angeles engineering redirect",
                "status": "$LAENG_STATUS",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": 200
              }
            ],
            "incidents": []
          }
          JSONEOF

      - name: Commit status update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if ! git diff --cached --quiet --exit-code; then
            git commit -m "Update status - $(date)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/bwengr/bwengr-status.git HEAD:main || echo "Push failed"
          else
            echo "No changes to commit"
          fi