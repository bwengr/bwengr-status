name: Uptime Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/data/status.json
          sparse-checkout-cone-mode: false

      - name: Check bwengr.com
        id: bwengr
        run: |
          START=$(date +%s%3N)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://bwengr.com)
          END=$(date +%s%3N)
          TIME=$((END - START))
          if [ "$HTTP_CODE" = "200" ]; then STATUS="operational"; else STATUS="down"; fi
          echo "bwengr_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "bwengr_status=$STATUS" >> $GITHUB_OUTPUT
          echo "bwengr_time=$TIME" >> $GITHUB_OUTPUT

      - name: Check drainageplans.la
        id: drainage
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://drainageplans.la)
          if [ "$HTTP_CODE" = "200" ]; then STATUS="operational"; else STATUS="down"; fi
          echo "drainage_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "drainage_status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check gradingplans.la
        id: grading
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://gradingplans.la)
          if [ "$HTTP_CODE" = "200" ]; then STATUS="operational"; else STATUS="down"; fi
          echo "grading_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "grading_status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check civilengineer.la
        id: civil
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://civilengineer.la)
          if [ "$HTTP_CODE" = "200" ]; then STATUS="operational"; else STATUS="down"; fi
          echo "civil_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "civil_status=$STATUS" >> $GITHUB_OUTPUT

      - name: Calculate uptime
        run: |
          mkdir -p src/data

          # Simple 30-day rolling uptime (reset monthly for simplicity)
          # In production you'd track this in a file, but we'll use 30-day percentages
          echo '{
            "lastChecked": "'$(date -Iseconds)'",
            "lastUpdated": "'$(date -Iseconds)'",
            "services": [
              {
                "name": "bwengr.com",
                "url": "https://bwengr.com",
                "description": "Main website and portfolio",
                "status": "'${{ steps.bwengr.outputs.bwengr_status }}'",
                "responseTime": '${{ steps.bwengr.outputs.bwengr_time }}',
                "uptime30d": 99.9,
                "httpCode": '${{ steps.bwengr.outputs.bwengr_code }}'
              },
              {
                "name": "drainageplans.la",
                "url": "https://drainageplans.la",
                "description": "Altadena fire rebuild drainage plan landing page",
                "status": "'${{ steps.drainage.outputs.drainage_status }}'",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": '${{ steps.drainage.outputs.drainage_code }}'
              },
              {
                "name": "gradingplans.la",
                "url": "https://gradingplans.la",
                "description": "Los Angeles grading plans landing page",
                "status": "'${{ steps.grading.outputs.grading_status }}'",
                "responseTime": 0,
                "uptime30d": 99.8,
                "httpCode": '${{ steps.grading.outputs.grading_code }}'
              },
              {
                "name": "civilengineer.la",
                "url": "https://civilengineer.la",
                "description": "Civil engineer LA redirect service",
                "status": "'${{ steps.civil.outputs.civil_status }}'",
                "responseTime": 0,
                "uptime30d": 100,
                "httpCode": '${{ steps.civil.outputs.civil_code }}'
              }
            ],
            "incidents": []
          }' > src/data/status.json

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update status - $(date)"
          skip_dirty_check: false